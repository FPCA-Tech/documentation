site_name: FPCA Tech Documentation
site_url: https://docs.fpca.tech
extra_css:
  - css/styles.css
theme:
  name: material
  logo: images/branding/logo.png
  analytics: G-SC1MHSNN7X
  features:
    - toc.integrate

plugins:
  - search # necessary for search to work
  - awesome-pages

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight  # Highly recommended to pair with superfences
  - pymdownx.keys
  - pymdownx.snippets:
      auto_append: ['.snippets/need-help.md']
      base_path: ['docs']
